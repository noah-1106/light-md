<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Light MD</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="app">
      <!-- Toolbar -->
      <header class="toolbar">
        <div class="toolbar-left">
          <button id="btn-new" title="新建 (Cmd+N)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <button id="btn-open" title="打开 (Cmd+O)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
          </button>
        </div>
        <div class="toolbar-right">
          <button id="btn-folder" title="打开默认文件夹">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
          <button id="btn-theme" title="切换主题">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Tab Bar -->
      <div class="tab-bar" id="tab-bar"></div>

      <!-- Editor + Preview -->
      <div class="main" id="main-area">
        <div class="editor-pane" id="editor-pane"></div>
        <div class="splitter" id="splitter"></div>
        <div class="preview-pane" id="preview-pane">
          <div class="preview-content" id="preview-content"></div>
        </div>
      </div>

      <!-- Welcome Screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-content">
          <div class="welcome-logo">L</div>
          <h1>Light MD</h1>
          <p>轻量 Markdown 编辑器</p>
          <div class="welcome-actions">
            <button id="welcome-new">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              新建文档
            </button>
            <button id="welcome-open">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
              打开文档
            </button>
          </div>
          <p class="welcome-hint">或拖拽 .md 文件到此处</p>
        </div>
      </div>

      <!-- Statusbar -->
      <footer class="statusbar">
        <span id="status-path">-</span>
        <span id="status-info">0 字 | 行 1, 列 1</span>
      </footer>
    </div>
  </body>
</html>
